services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: hhack
      POSTGRES_PASSWORD: hhack
      POSTGRES_DB: hhack
    ports:
      - "5432:5432"
    volumes:
      - hhack_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hhack -d hhack"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  hhack_postgres_data:
